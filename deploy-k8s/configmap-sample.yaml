apiVersion: v1
kind: ConfigMap
metadata:
  name: zeroclaw-config
  namespace: zeroclaw
  labels:
    app.kubernetes.io/name: zeroclaw
    app.kubernetes.io/part-of: zeroclaw
data:
  config.toml: |
    workspace_dir = "/zeroclaw-data/workspace"
    config_path = "/zeroclaw-data/.zeroclaw/config.toml"
    default_provider = "anthropic"
    default_model = "claude-sonnet-4-20250514"
    default_temperature = 0.7

    [gateway]
    port = 42617
    # Safe default. If exposing through a Service/Ingress, change host to "[::]"
    # and keep require_pairing enabled.
    host = "127.0.0.1"
    allow_public_bind = false
    require_pairing = true
    web_dist_dir = "/zeroclaw-data/web/dist"

    [autonomy]
    level = "supervised"
    auto_approve = ["file_read", "file_write", "file_edit", "memory_recall", "memory_store", "web_search_tool", "web_fetch", "calculator", "glob_search", "content_search", "image_info", "weather", "git_operations"]
