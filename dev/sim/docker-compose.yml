# OpsClaw Simulation Environment
#
# Usage: managed via sim.sh (don't run docker compose directly).
#
# The sim-target runs under gVisor (`runtime: runsc`). gVisor is a
# user-space Linux kernel that implements /proc, /sys, syscalls, and
# memory accounting itself — so `cat /proc/meminfo` from inside the
# container reports the cgroup's 8 GB cap, `top` reports processes
# scoped to the sandbox, and `stress-ng` causes real pressure that the
# Sentry accounts for. There is nothing for an agent to "see past":
# there is no host /proc visible from inside.
#
# See https://gvisor.dev/docs/ for the runtime; install with
# `sudo runsc install && sudo systemctl restart docker` (one-time).
name: opsclaw-sim
services:
  sim-target:
    build: ./sim-target
    container_name: opsclaw-sim-target
    runtime: runsc
    environment:
      - AUTHORIZED_KEY=${SIM_SSH_PUBKEY}
      - SSH_PORT=2222
    ports:
      - "127.0.0.1:2222:2222"
    # Hard cgroup limits. gVisor's Sentry honours these in its own /proc,
    # so MemTotal = 8 GB inside the container.
    mem_limit: 8g
    memswap_limit: 8g
    cpus: 4
    # NET_ADMIN: tc-netem for latency/loss scenarios.
    cap_add:
      - NET_ADMIN
    # Disk-pressure scenarios fill /data, a bounded tmpfs that evaporates
    # on `docker compose down`.
    tmpfs:
      - /data:size=200m
    networks:
      - simnet

  webhook-sink:
    build: ./webhook-sink
    container_name: opsclaw-webhook-sink
    volumes:
      - ./.state:/data
    ports:
      - "127.0.0.1:9999:9999"
    environment:
      - PORT=9999
    networks:
      - simnet

networks:
  simnet:
    driver: bridge
