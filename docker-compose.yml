# OpsClaw Docker Compose Example
#
# Quick start:
#   1. Copy this file and set your API key
#   2. Run: docker compose up -d
#   3. Access gateway at http://localhost:42617
#
# For more info: https://github.com/dcprevere/opsclaw

services:
  opsclaw:
    # Pin this to an immutable release tag or digest for production.
    image: ghcr.io/dcprevere/opsclaw:${OPSCLAW_IMAGE_TAG:-v0.7.1}
    # For ARM64 environments where the distroless image exits immediately,
    # switch to the Debian compatibility image instead:
    # image: ghcr.io/dcprevere/opsclaw:debian
    # Or build locally (distroless, no shell):
    # build: .
    # Or build the Debian variant (includes bash, git, curl):
    # build:
    #   context: .
    #   dockerfile: Dockerfile.debian
    container_name: opsclaw
    restart: unless-stopped

    environment:
      # Required: Your LLM provider API key
      - API_KEY=${API_KEY:-}
      # Or use the prefixed version:
      # - OPSCLAW_API_KEY=${OPSCLAW_API_KEY:-}

      # Optional: LLM provider (default: openrouter)
      # Options: openrouter, openai, anthropic, ollama
      - PROVIDER=${PROVIDER:-openrouter}

      # The container listens on all interfaces, but the host port is bound
      # to loopback below. Override deliberately if exposing through a proxy.
      - OPSCLAW_GATEWAY_HOST=${OPSCLAW_GATEWAY_HOST:-[::]}
      - OPSCLAW_ALLOW_PUBLIC_BIND=${OPSCLAW_ALLOW_PUBLIC_BIND:-true}
      - OPSCLAW_REQUIRE_PAIRING=${OPSCLAW_REQUIRE_PAIRING:-true}
      # Default gateway port inside container
      - OPSCLAW_GATEWAY_PORT=${OPSCLAW_GATEWAY_PORT:-42617}

      # Optional: Model override
      # - OPSCLAW_MODEL=anthropic/claude-sonnet-4-20250514

    volumes:
      # Persist workspace and config (must match WORKDIR/HOME in Dockerfile)
      - opsclaw-data:/opsclaw-data

    ports:
      # Gateway API port. Secure default: host loopback only.
      # Set HOST_BIND=0.0.0.0 only when protected by pairing and a trusted proxy/firewall.
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-42617}:${OPSCLAW_GATEWAY_PORT:-42617}"

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 32M

    # Health check — uses lightweight status instead of full diagnostics.
    # For images with curl, prefer: curl -f http://localhost:42617/health
    healthcheck:
      test: ["CMD", "opsclaw", "status", "--format=exit-code"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  opsclaw-data:
